<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      font-family: 'Malgun Gothic', sans-serif;
      padding: 10px;
      margin: 0;
      background-color: #f7f9fa;
    }
    h3 {
      font-size: 14px;
      color: #1ec800;
      margin-top: 0;
      margin-bottom: 8px;
    }
    textarea {
      width: 93%;
      height: 150px;
      padding: 8px;
      border: 1px solid #dadada;
      border-radius: 4px;
      resize: none;
      font-family: monospace;
      font-size: 11px;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #1ec800;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      background-color: #17b000;
    }
    #status {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h3>HTML 코드를 입력하세요</h3>
  <textarea id="htmlInput" placeholder="<p>여기에 AI가 만들어준 HTML 코드를 붙여넣으세요.</p>"></textarea>
  <button id="copyBtn">네이버 블로그용 복사하기</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
